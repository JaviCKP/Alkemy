tables:
  pedidos:
    columns:
      id:
        role: identificador
        acceptable_generators: [sequence, uuid]
      fecha:
        role: fecha_pedido
        acceptable_generators: [datetime_range]
      factura_id:
        role: fk_factura
        acceptable_generators: [derived, sequence, uuid]
        notes: "NOT NULL pero DEFERRABLE INITIALLY DEFERRED en ambos sentidos. Lo que se juega este fixture es la estrategia estructural (transacción con constraints diferidas, T1.7), no el rol semántico"
  facturas:
    columns:
      id:
        role: identificador
        acceptable_generators: [sequence, uuid]
      numero:
        role: numero_factura
        acceptable_generators: [template, sequence]
      pedido_id:
        role: fk_pedido
        acceptable_generators: [derived, sequence, uuid]
        notes: "NOT NULL, DEFERRABLE INITIALLY DEFERRED"
