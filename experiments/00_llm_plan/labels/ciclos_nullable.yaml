tables:
  pedidos:
    columns:
      id:
        role: identificador
        acceptable_generators: [sequence, uuid]
      fecha:
        role: fecha_pedido
        acceptable_generators: [datetime_range]
      factura_id:
        role: fk_factura
        acceptable_generators: [derived, sequence, uuid]
        notes: "NULLABLE: rompe el ciclo mutuo con facturas (Insert NULL + Update). El generador correcto es secundario aquí; lo que se juega este fixture es la estrategia estructural (T1.7), no el rol semántico"
  facturas:
    columns:
      id:
        role: identificador
        acceptable_generators: [sequence, uuid]
      numero:
        role: numero_factura
        acceptable_generators: [template, sequence]
      pedido_id:
        role: fk_pedido
        acceptable_generators: [derived, sequence, uuid]
        notes: "NOT NULL"
